<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Fair</title>
</head>
<body>

    <!-- BOOK-FAIR-2026-KEY -->

    <header>
        <h1>Book Fair 2026</h1>
        <p>Discover New Books and Meet Authors!</p>
        <a href="#register">Register Now</a>
    </header>

    <section>
        <h2>Why Visit?</h2>
        <ul>
            <li>Explore Thousands of Books</li>
            <li>Meet Famous Authors</li>
            <li>Get Special Discounts</li>
        </ul>
    </section>

    <section>
        <h2>Fair Highlight</h2>
        <img src="assets/bookfair.jpg" alt="Book Fair Image" width="300">
    </section>

    <section id="register">
        <h2>Registration</h2>
        <form>
            <p>Name:</p>
            <input type="text" placeholder="Enter your name">

            <p>Email:</p>
            <input type="email" placeholder="Enter your email">

            <p>City:</p>
            <input type="text" placeholder="Enter your city">

            <br><br>
            <button type="submit">Register</button>
        </form>
    </section>

    <footer>
        <p>© 2026 Book Fair</p>
    </footer>

</body>
</html>
